name: Sample Book App Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-install-deps:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - run: echo "Installing all necessary node dependencies.."
      - name: Install all dependencies
        run: npm install
      - run: echo "Dependecies successfully installed.." 
  deploy-dev:
    runs-on: self-hosted
    needs: build-install-deps
    steps:
      - uses: ./.github/actions/deploy
        with:
          environment: 'DEV'
          port: 1010
  test-dev:
    runs-on: self-hosted
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on DEV environment.."
  deploy-stg:
    runs-on: self-hosted
    needs: test-dev
    steps:
      - uses: ./.github/actions/deploy
        with:
          environment: 'STG'
          port: 2020
  test-stg:
    runs-on: self-hosted
    needs: deploy-stg
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on STG environment.."
  deploy-prd:
    runs-on: self-hosted
    needs: test-stg
    steps:
      - uses: ./.github/actions/deploy
        with:
          environment: 'PRD'
          port: 3030
  test-prd:
    runs-on: self-hosted
    needs: deploy-prd 
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on PRD environment.."
    
